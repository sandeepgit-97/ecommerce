{% extends "Main.html" %}
{% load static %} 
{% block content %}
<div class="text-center">
<h2 class="store-title">Our Products</h2>
</div>
<div class="row">
	{% for Product in products %}
	<div class="col-lg-3">
		<img class="thumbnail" src="{{Product.imageURL}}">
		<div class="box-element product">
			<h6><strong>{{Product.name}}</strong></h6>
			<button
                data-product="{{ Product.id }}" 
                data-action="add" 
                class="btn btn-outline-secondary add-btn update-cart">
                Add to Cart
            </button>			
			<a class="btn btn-outline-success" href="{% url 'product_view' Product.id %}">View</a>
			<h3 style="display: inline-block; float: right"><strong>{{Product.price|floatformat:2}}</strong></h3>
			
		</div>
	</div>

	
{% endfor %} 
{% endblock  %}
